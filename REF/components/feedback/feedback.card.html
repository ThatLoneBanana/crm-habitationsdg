<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" />
<style>
  body { margin:0; background:var(--bg-canvas); padding:22px; }
  .wrap { display:flex; flex-direction:column; gap:20px; }
  .lbl { font-size:var(--text-2xs); font-weight:var(--fw-semibold); letter-spacing:var(--ls-label); text-transform:uppercase; color:var(--text-tertiary); margin-bottom:9px; }
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-start; }
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const NS = window.HabitationsDGDesignSystem_408490;
const { Toast, Dialog, Skeleton, SkeletonRow, EmptyState, Button } = NS;

function Demo() {
  return (
    <>
      <div><div className="lbl">Toasts</div>
        <div className="row">
          <Toast tone="success" title="Cédule envoyée" message="Le client a reçu l'échéancier par courriel." onClose={()=>{}} />
          <Toast tone="warning" title="Étape décalée" message="3 étapes recalculées en cascade." action={<Button size="sm" variant="ghost">Annuler</Button>} />
          <Toast tone="danger" title="Conflit détecté" message="« Pose gypse » chevauche l'étape précédente." onClose={()=>{}} />
        </div>
      </div>

      <div><div className="lbl">Dialog de confirmation</div>
        <div className="panel" style={{ position:'relative', height:230, overflow:'hidden', padding:0 }}>
          <div style={{ position:'absolute', inset:0 }}>
            <Dialog open={true} tone="danger" icon="trash" title="Supprimer ce projet ?"
              footer={<><Button variant="ghost">Annuler</Button><Button variant="danger">Supprimer définitivement</Button></>}>
              Cette action est irréversible. La cédule, les extras et les paiements liés à <b>18 Rue des Érables</b> seront retirés.
            </Dialog>
          </div>
        </div>
      </div>

      <div className="row" style={{ gap:20 }}>
        <div style={{ flex:1, minWidth:260 }}><div className="lbl">Skeleton (chargement)</div>
          <div className="panel" style={{ padding:0 }}>
            <SkeletonRow cols={[36,"55%",80,60]} />
            <SkeletonRow cols={[36,"40%",80,60]} />
            <SkeletonRow cols={[36,"62%",80,60]} />
          </div>
        </div>
        <div style={{ flex:1, minWidth:260 }}><div className="lbl">Empty state</div>
          <div className="panel" style={{ padding:0 }}>
            <EmptyState compact icon="building-community" title="Aucun projet actif"
              message="Crée ton premier projet pour générer une cédule." />
          </div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
