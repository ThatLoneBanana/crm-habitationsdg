<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .panel{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;height:130px;}
  .light{background:var(--surface);}
  .dark{background:var(--n-900);}
  .panel img{height:62px;}
  .cap{font-size:9px;color:var(--text-tertiary);text-align:center;margin-top:6px;}
</style></head>
<body>
  <div class="row">
    <div style="flex:1"><div class="panel light"><img src="../assets/habitationsdg.svg" alt="Habitations DG" /></div><div class="cap">habitationsdg.svg — primary lockup</div></div>
    <div style="flex:1"><div class="panel dark"><img src="../assets/habitationsdg-icon.svg" alt="Monogramme H" style="height:78px" /></div><div class="cap">habitationsdg-icon.svg — H monogram</div></div>
  </div>
</body></html>
