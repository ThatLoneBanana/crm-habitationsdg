<!-- @dsCard group="Colors" viewport="700x150" name="Brand red — action" subtitle="DC2626 action · EA1C24 mark · tints" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-sans);}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border);background:var(--surface);}
  .chip{height:54px;display:flex;align-items:flex-end;padding:7px;}
  .meta{padding:7px 8px;}
  .name{font-size:var(--text-xs);font-weight:var(--fw-semibold);color:var(--text-primary);}
  .hex{font-size:var(--text-2xs);color:var(--text-tertiary);font-variant-numeric:tabular-nums;text-transform:uppercase;}
  .tag{font-size:9px;font-weight:var(--fw-semibold);color:#fff;background:rgba(0,0,0,.22);padding:1px 5px;border-radius:4px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--dg-red)"><span class="tag">action</span></div><div class="meta"><div class="name">--dg-red</div><div class="hex">#DC2626</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dg-red-hover)"></div><div class="meta"><div class="name">--dg-red-hover</div><div class="hex">#C01D1D</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dg-red-press)"></div><div class="meta"><div class="name">--dg-red-press</div><div class="hex">#A81818</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dg-red-logo)"><span class="tag">mark</span></div><div class="meta"><div class="name">--dg-red-logo</div><div class="hex">#EA1C24</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dg-red-100)"></div><div class="meta"><div class="name">--dg-red-100</div><div class="hex">#FEE2E2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dg-red-50);border-bottom:1px solid var(--border)"></div><div class="meta"><div class="name">--dg-red-50</div><div class="hex">#FEF2F2</div></div></div>
  </div>
</body></html>
