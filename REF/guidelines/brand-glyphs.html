<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface);padding:20px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .item{flex:1;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-canvas);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .item img{height:42px;width:42px;opacity:.85;}
  .name{font-size:var(--text-xs);font-weight:var(--fw-semibold);color:var(--text-primary);}
  .file{font-size:9px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="row">
    <div class="item"><img src="../assets/maison.svg" alt="" /><div class="name">Maison</div><div class="file">maison.svg</div></div>
    <div class="item"><img src="../assets/jumele.svg" alt="" /><div class="name">Jumelé</div><div class="file">jumele.svg</div></div>
    <div class="item"><img src="../assets/logement.svg" alt="" /><div class="name">Logement</div><div class="file">logement.svg</div></div>
  </div>
</body></html>
