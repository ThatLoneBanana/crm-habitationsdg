<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ink & surface" subtitle="Warm-neutral scale n-900 → n-0" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--bg-canvas);padding:18px;font-family:var(--font-sans);}
  .row{display:flex;gap:6px;}
  .sw{flex:1;}
  .chip{height:62px;border-radius:var(--radius-sm);border:1px solid var(--border);}
  .name{font-size:9px;font-weight:var(--fw-semibold);color:var(--text-secondary);margin-top:6px;text-align:center;font-variant-numeric:tabular-nums;}
  .hex{font-size:8px;color:var(--text-tertiary);text-align:center;text-transform:uppercase;font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--n-900)"></div><div class="name">900</div><div class="hex">1F1D1B</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-800)"></div><div class="name">800</div><div class="hex">33312D</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-700)"></div><div class="name">700</div><div class="hex">4A4742</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-600)"></div><div class="name">600</div><div class="hex">65615A</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-500)"></div><div class="name">500</div><div class="hex">847F76</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-400)"></div><div class="name">400</div><div class="hex">A8A59D</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-300)"></div><div class="name">300</div><div class="hex">CBC9C2</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-200)"></div><div class="name">200</div><div class="hex">E2E0DB</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-100)"></div><div class="name">100</div><div class="hex">F1F0ED</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-50)"></div><div class="name">50</div><div class="hex">F7F6F4</div></div>
    <div class="sw"><div class="chip" style="background:var(--n-0)"></div><div class="name">0</div><div class="hex">FFFFFF</div></div>
  </div>
</body></html>
