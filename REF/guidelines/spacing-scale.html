<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface);padding:20px;font-family:var(--font-sans);color:var(--text-primary);}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .bar{background:var(--dg-red);border-radius:2px;width:18px;}
  .tok{font-size:9px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;text-align:center;}
  .tok b{display:block;color:var(--text-secondary);font-weight:var(--fw-semibold);font-size:var(--text-2xs);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="tok"><b>1</b>4px</div></div>
    <div class="item"><div class="bar" style="height:6px"></div><div class="tok"><b>2</b>6px</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="tok"><b>3</b>8px</div></div>
    <div class="item"><div class="bar" style="height:10px"></div><div class="tok"><b>4</b>10px</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="tok"><b>5</b>12px</div></div>
    <div class="item"><div class="bar" style="height:14px"></div><div class="tok"><b>6</b>14px</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="tok"><b>7</b>16px</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="tok"><b>8</b>20px</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="tok"><b>9</b>24px</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="tok"><b>10</b>32px</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="tok"><b>11</b>40px</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="tok"><b>12</b>48px</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="tok"><b>14</b>64px</div></div>
  </div>
</body></html>
